<?xml version="1.0" encoding="UTF-8"?>
<!--
  Patent Drawing: FIG. 3 - Multi-Modal Trigger Detection Logic
  Applicant: J & N Yates Pty Ltd ACN 629 701 364
-->
<svg width="700" height="460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="black"/>
    </marker>
  </defs>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; }
    .title { font-size:14px; font-weight:bold; }
    .sub   { font-size:11px; font-weight:bold; }
    .label { font-size:10px; }
    .ref   { font-size:9px; font-style:italic; }
    .small { font-size:8px; }
    line.flow { stroke:black; stroke-width:1.8; marker-end:url(#arr); }
    line.dsh  { stroke:black; stroke-width:1.2; stroke-dasharray:5,3; marker-end:url(#arr); }
    rect.box  { fill:white; stroke:black; stroke-width:2; }
    rect.inn  { fill:white; stroke:black; stroke-width:1.5; }
    rect.opt  { fill:white; stroke:black; stroke-width:1.5; stroke-dasharray:6,3; }
  </style>

  <rect width="700" height="460" fill="white"/>

  <text x="350" y="26" text-anchor="middle" class="title">FIG. 3</text>
  <text x="350" y="44" text-anchor="middle" class="sub">MULTI-MODAL TRIGGER DETECTION LOGIC  [130]</text>

  <!-- ====== INPUT BOXES (left column) ====== -->

  <!-- Voice Trigger Engine [131] -->
  <rect x="30" y="80" width="190" height="72" class="box" rx="4"/>
  <text x="125" y="104" text-anchor="middle" class="label" font-weight="bold">VOICE TRIGGER ENGINE</text>
  <text x="125" y="119" text-anchor="middle" class="ref">[131]</text>
  <text x="125" y="134" text-anchor="middle" class="small">User-defined trigger phrase</text>
  <text x="125" y="147" text-anchor="middle" class="small">(any word / phrase)</text>

  <!-- Optional voice enrollment [135] (dashed) -->
  <rect x="30" y="175" width="190" height="52" class="opt" rx="4"/>
  <text x="125" y="197" text-anchor="middle" class="label">VOICE PROFILE STORE</text>
  <text x="125" y="212" text-anchor="middle" class="ref">[135]  (Optional enrollment)</text>
  <text x="125" y="227" text-anchor="middle" class="small">Speaker-specific model</text>
  <!-- enrollment link to voice engine (dashed) -->
  <line x1="125" y1="175" x2="125" y2="152" class="dsh"/>
  <text x="133" y="168" class="small">optimises</text>

  <!-- In-App Trigger [132] -->
  <rect x="30" y="255" width="190" height="60" class="box" rx="4"/>
  <text x="125" y="278" text-anchor="middle" class="label" font-weight="bold">IN-APPLICATION TRIGGER</text>
  <text x="125" y="293" text-anchor="middle" class="ref">[132]</text>
  <text x="125" y="308" text-anchor="middle" class="small">UI control interaction</text>

  <!-- Bluetooth Trigger [133] -->
  <rect x="30" y="345" width="190" height="72" class="box" rx="4"/>
  <text x="125" y="368" text-anchor="middle" class="label" font-weight="bold">BLUETOOTH PERIPHERAL</text>
  <text x="125" y="383" text-anchor="middle" class="ref">[133]</text>
  <text x="125" y="398" text-anchor="middle" class="small">Earbud [200] / Watch [210]</text>
  <text x="125" y="412" text-anchor="middle" class="small">tap · button · media-key</text>

  <!-- ====== FLOW LINES to OR gate ====== -->
  <!-- Voice [131] → OR gate -->
  <line x1="220" y1="116" x2="380" y2="230" class="flow"/>
  <!-- In-app [132] → OR gate -->
  <line x1="220" y1="285" x2="380" y2="258" class="flow"/>
  <!-- BT [133] → OR gate -->
  <line x1="220" y1="381" x2="380" y2="278" class="flow"/>

  <!-- ====== OR GATE [134] ====== -->
  <!-- Draw as a pentagon/shield shape with text -->
  <polygon points="380,218 460,218 490,260 460,302 380,302"
           fill="white" stroke="black" stroke-width="2.5"/>
  <text x="435" y="255" text-anchor="middle" class="sub">OR</text>
  <text x="435" y="273" text-anchor="middle" class="ref">[134]</text>

  <!-- ====== OUTPUT → Trigger Manager [130] ====== -->
  <line x1="490" y1="260" x2="560" y2="260" class="flow"/>

  <rect x="560" y="224" width="120" height="72" class="inn" rx="4"/>
  <text x="620" y="248" text-anchor="middle" class="label" font-weight="bold">TRIGGER</text>
  <text x="620" y="264" text-anchor="middle" class="label" font-weight="bold">ACCEPTED</text>
  <text x="620" y="280" text-anchor="middle" class="ref">[130]</text>
  <text x="620" y="294" text-anchor="middle" class="small">→ Capture [140]</text>

  <!-- Output brace with label -->
  <text x="510" y="252" class="small">TRIGGER</text>
  <text x="510" y="264" class="small">SIGNAL</text>

  <!-- Condition note -->
  <text x="435" y="332" text-anchor="middle" class="small" font-style="italic">Any one input sufficient to trigger</text>

  <!-- Reference line -->
  <line x1="10" y1="430" x2="690" y2="430" stroke="black" stroke-width="0.6"/>
  <text x="350" y="447" text-anchor="middle" class="small">
    [130] Trigger Manager  ·  [131] Voice Path  ·  [132] In-App Path  ·  [133] BT Path  ·  [134] OR-Gate  ·  [135] Voice Profile (opt.)  ·  [200] Earbuds  ·  [210] Watch
  </text>
</svg>
