<svg width="760" height="380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="black"/>
    </marker>
  </defs>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; }
    .title { font-size:14px; font-weight:bold; }
    .sub   { font-size:11px; font-weight:bold; }
    .label { font-size:10px; }
    .ref   { font-size:9px; font-style:italic; }
    .small { font-size:8px; }
    line.flow { stroke:black; stroke-width:2; marker-end:url(#arr); }
    line.side { stroke:black; stroke-width:1.2; stroke-dasharray:5,3; marker-end:url(#arr); }
    rect.box  { fill:white; stroke:black; stroke-width:2; }
    rect.out  { fill:white; stroke:black; stroke-width:2.5; }
  </style>

  <rect width="760" height="380" fill="white"/>

  <text x="380" y="26" text-anchor="middle" class="title">FIG. 5</text>
  <text x="380" y="44" text-anchor="middle" class="sub">POST-CAPTURE PROCESSING PIPELINE</text>

  <!-- === Step 1: Assembled Clip [143] === -->
  <rect x="20" y="110" width="120" height="80" class="box" rx="4"/>
  <text x="80" y="143" text-anchor="middle" class="label" font-weight="bold">ASSEMBLED</text>
  <text x="80" y="158" text-anchor="middle" class="label" font-weight="bold">AUDIO CLIP</text>
  <text x="80" y="176" text-anchor="middle" class="ref">C   [143]</text>

  <!-- arrow 1→2 -->
  <line x1="140" y1="150" x2="174" y2="150" class="flow"/>

  <!-- === Step 2: Transcription [150] === -->
  <rect x="175" y="110" width="120" height="80" class="box" rx="4"/>
  <text x="235" y="143" text-anchor="middle" class="label" font-weight="bold">TRANSCRIPTION</text>
  <text x="235" y="158" text-anchor="middle" class="label" font-weight="bold">MODULE</text>
  <text x="235" y="176" text-anchor="middle" class="ref">[150]</text>

  <!-- Label under step 2 -->
  <text x="235" y="204" text-anchor="middle" class="small">Speech-to-text</text>
  <text x="235" y="216" text-anchor="middle" class="small">conversion</text>

  <!-- arrow 2→3 -->
  <line x1="295" y1="150" x2="329" y2="150" class="flow"/>
  <!-- transcript side output -->
  <line x1="235" y1="190" x2="235" y2="228" class="side"/>
  <text x="246" y="242" class="small">transcript text</text>

  <!-- === Step 3: Key Phrase Extractor [161] === -->
  <rect x="330" y="110" width="120" height="80" class="box" rx="4"/>
  <text x="390" y="137" text-anchor="middle" class="label" font-weight="bold">KEY PHRASE</text>
  <text x="390" y="152" text-anchor="middle" class="label" font-weight="bold">EXTRACTOR</text>
  <text x="390" y="167" text-anchor="middle" class="ref">[161]</text>
  <text x="390" y="183" text-anchor="middle" class="small">n-gram analysis</text>

  <!-- Label under step 3 -->
  <text x="390" y="204" text-anchor="middle" class="small">Identifies significant</text>
  <text x="390" y="216" text-anchor="middle" class="small">words and phrases</text>

  <!-- arrow 3→4 -->
  <line x1="450" y1="150" x2="484" y2="150" class="flow"/>
  <!-- key phrases side output -->
  <line x1="390" y1="190" x2="390" y2="228" class="side"/>
  <text x="401" y="242" class="small">key phrases</text>

  <!-- === Step 4: Topic Classifier [162] === -->
  <rect x="485" y="110" width="120" height="80" class="box" rx="4"/>
  <text x="545" y="137" text-anchor="middle" class="label" font-weight="bold">TOPIC</text>
  <text x="545" y="152" text-anchor="middle" class="label" font-weight="bold">CLASSIFIER</text>
  <text x="545" y="167" text-anchor="middle" class="ref">[162]</text>
  <text x="545" y="183" text-anchor="middle" class="small">Maps → domain class</text>

  <!-- Label under step 4 -->
  <text x="545" y="204" text-anchor="middle" class="small">Health / Business /</text>
  <text x="545" y="216" text-anchor="middle" class="small">Finance / Custom …</text>

  <!-- arrow 4→5 -->
  <line x1="605" y1="150" x2="639" y2="150" class="flow"/>
  <!-- topic tags side output -->
  <line x1="545" y1="190" x2="545" y2="228" class="side"/>
  <text x="556" y="242" class="small">topic tags</text>

  <!-- === Step 5: Secure Vault [170] === -->
  <rect x="640" y="100" width="110" height="100" class="out" rx="4"/>
  <text x="695" y="133" text-anchor="middle" class="label" font-weight="bold">SECURE</text>
  <text x="695" y="148" text-anchor="middle" class="label" font-weight="bold">VAULT</text>
  <text x="695" y="163" text-anchor="middle" class="ref">[170]</text>
  <text x="695" y="180" text-anchor="middle" class="small">Clip + Transcript</text>
  <text x="695" y="192" text-anchor="middle" class="small">+ Tags + Metadata</text>

  <!-- === Collective metadata stream below all === -->
  <rect x="175" y="270" width="435" height="40" fill="white" stroke="black" stroke-width="1.5" rx="3"/>
  <text x="392" y="289" text-anchor="middle" class="label" font-weight="bold">STRUCTURED KNOWLEDGE RECORD</text>
  <text x="392" y="304" text-anchor="middle" class="ref">[clip C] + [transcript] + [key phrases] + [topic tags] + [timestamp] → [170]</text>
  <!-- Lines from side outputs down to record bar -->
  <line x1="235" y1="252" x2="235" y2="268" class="side"/>
  <line x1="390" y1="252" x2="390" y2="268" class="side"/>
  <line x1="545" y1="252" x2="545" y2="268" class="side"/>
  <!-- Line from record to vault -->
  <line x1="610" y1="290" x2="695" y2="202" class="side"/>

  <!-- Pipeline header labels -->
  <text x="80"  y="100" text-anchor="middle" class="small" font-weight="bold">INPUT</text>
  <text x="235" y="100" text-anchor="middle" class="small" font-weight="bold">STEP 1</text>
  <text x="390" y="100" text-anchor="middle" class="small" font-weight="bold">STEP 2</text>
  <text x="545" y="100" text-anchor="middle" class="small" font-weight="bold">STEP 3</text>
  <text x="695" y="92"  text-anchor="middle" class="small" font-weight="bold">OUTPUT</text>

  <!-- ====== ESSENTIAL MARKING ====== -->
  <text x="380" y="340" text-anchor="middle" class="small" font-style="italic">
    Steps 1–3 (transcription → key phrase extraction → topic classification) are ESSENTIAL pipeline elements per claim 1.
  </text>

  <!-- Reference line -->
  <line x1="10" y1="358" x2="750" y2="358" stroke="black" stroke-width="0.6"/>
  <text x="380" y="372" text-anchor="middle" class="small">
    [143] Clip C  ·  [150] Transcription  ·  [160] Topic Extraction Module  ·  [161] Key Phrase Extractor  ·  [162] Classifier  ·  [170] Vault
  </text>
