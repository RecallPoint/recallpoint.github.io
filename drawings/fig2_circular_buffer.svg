<?xml version="1.0" encoding="UTF-8"?>
<!--
  Patent Drawing: FIG. 2 - Volatile Circular Buffer Memory Management
  Applicant: J & N Yates Pty Ltd ACN 629 701 364
-->
<svg width="720" height="580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="black"/>
    </marker>
    <marker id="arr-rev" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="black"/>
    </marker>
    <!-- hatching pattern for "used" buffer segments -->
    <pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="black" stroke-width="1"/>
    </pattern>
  </defs>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; }
    .title { font-size:14px; font-weight:bold; }
    .sub   { font-size:11px; font-weight:bold; }
    .label { font-size:10px; }
    .ref   { font-size:9px; font-style:italic; }
    .small { font-size:8px; }
    line.flow { stroke:black; stroke-width:1.8; marker-end:url(#arr); }
  </style>

  <rect width="720" height="580" fill="white"/>

  <!-- Page title -->
  <text x="360" y="26" text-anchor="middle" class="title">FIG. 2</text>
  <text x="360" y="44" text-anchor="middle" class="sub">VOLATILE CIRCULAR BUFFER MEMORY MANAGEMENT  [120]</text>

  <!-- ======  CIRCLE BUFFER (centred at 360, 290, r=160)  ====== -->
  <!-- Full white ring -->
  <circle cx="360" cy="295" r="160" fill="white" stroke="black" stroke-width="2.5"/>
  <circle cx="360" cy="295" r="85"  fill="white" stroke="black" stroke-width="2.5"/>

  <!-- Arc segments — 8 equal sectors of 45° each, labelled t-N to t0 -->
  <!-- We'll draw dividing radial lines at 0°, 45°, 90°, 135°, 180°, 225°, 270°, 315° relative to top -->
  <!-- 0° = top = 12 o'clock.  Angles in SVG: 0=right, counter-clockwise positive in standard math -->
  <!-- In SVG coords: angle 0 = right (3 o'clock). We offset so top = -90°  -->
  <!-- Radial lines from inner circle to outer circle -->
  <!-- sector divisions at svg angles: -90, -45, 0, 45, 90, 135, 180, 225 (all in degrees from right) -->

  <!-- Radial dividers (8 at 45° intervals) -->
  <line x1="360" y1="135" x2="360" y2="210" stroke="black" stroke-width="1.2"/>
  <line x1="473" y1="182" x2="421" y2="234" stroke="black" stroke-width="1.2"/>
  <line x1="520" y1="295" x2="445" y2="295" stroke="black" stroke-width="1.2"/>
  <line x1="473" y1="408" x2="421" y2="356" stroke="black" stroke-width="1.2"/>
  <line x1="360" y1="455" x2="360" y2="380" stroke="black" stroke-width="1.2"/>
  <line x1="247" y1="408" x2="299" y2="356" stroke="black" stroke-width="1.2"/>
  <line x1="200" y1="295" x2="275" y2="295" stroke="black" stroke-width="1.2"/>
  <line x1="247" y1="182" x2="299" y2="234" stroke="black" stroke-width="1.2"/>

  <!-- Hatching in "filled" sectors to show stored audio data (sectors from 0° to 270°, i.e. 6 of 8 sectors) -->
  <!-- We use a simple filled arc approximation with SVG arc paths -->
  <!-- Each sector arc path, fill with hatch pattern (showing stored audio) -->
  <!-- Sector 1: -90° to -45° (top to top-right) -->
  <path d="M 360 135 A 160 160 0 0 1 473 182 L 421 234 A 85 85 0 0 0 360 210 Z"
        fill="url(#hatch)" stroke="none" opacity="0.45"/>
  <!-- Sector 2: -45° to 0° (top-right to right) -->
  <path d="M 473 182 A 160 160 0 0 1 520 295 L 445 295 A 85 85 0 0 0 421 234 Z"
        fill="url(#hatch)" stroke="none" opacity="0.45"/>
  <!-- Sector 3: 0° to 45° (right to bottom-right) -->
  <path d="M 520 295 A 160 160 0 0 1 473 408 L 421 356 A 85 85 0 0 0 445 295 Z"
        fill="url(#hatch)" stroke="none" opacity="0.45"/>
  <!-- Sector 4: 45° to 90° (bottom-right to bottom) -->
  <path d="M 473 408 A 160 160 0 0 1 360 455 L 360 380 A 85 85 0 0 0 421 356 Z"
        fill="url(#hatch)" stroke="none" opacity="0.45"/>
  <!-- Sector 5: 90° to 135° (bottom to bottom-left) -->
  <path d="M 360 455 A 160 160 0 0 1 247 408 L 299 356 A 85 85 0 0 0 360 380 Z"
        fill="url(#hatch)" stroke="none" opacity="0.45"/>
  <!-- Sector 6: 135° to 180° (bottom-left to left) -->
  <path d="M 247 408 A 160 160 0 0 1 200 295 L 275 295 A 85 85 0 0 0 299 356 Z"
        fill="url(#hatch)" stroke="none" opacity="0.45"/>

  <!-- Sector labels (midpoint of each 45° arc, placed in annular gap) -->
  <!-- Sector midpoints at angles: -67.5, -22.5, +22.5, +67.5, +112.5, +157.5, +202.5, +247.5 from top (clockwise) -->
  <!-- Converting to SVG screen coords, radius 125: -->
  <text x="390" y="162" text-anchor="middle" class="small">t−T</text>
  <text x="470" y="232" text-anchor="middle" class="small">t−6T/8</text>
  <text x="496" y="308" text-anchor="middle" class="small">t−5T/8</text>
  <text x="464" y="382" text-anchor="middle" class="small">t−4T/8</text>
  <text x="384" y="440" text-anchor="middle" class="small">t−3T/8</text>
  <text x="270" y="415" text-anchor="middle" class="small">t−2T/8</text>
  <!-- Sector 7: empty (current write head approaching overwrite head) -->
  <text x="213" y="308" text-anchor="middle" class="small">t−T/8</text>
  <!-- Sector 8: overwrite zone -->
  <text x="270" y="225" text-anchor="middle" class="small">WRITE →</text>

  <!-- Write Head [121] arrow (at top, pointing clockwise) -->
  <line x1="360" y1="120" x2="360" y2="135" class="flow"/>
  <text x="370" y="116" class="label" font-weight="bold">WRITE HEAD [121]</text>

  <!-- Overwrite Head [122] arrow -->
  <line x1="222" y1="224" x2="247" y2="182" class="flow"/>
  <text x="130" y="212" class="label" font-weight="bold">OVERWRITE HEAD [122]</text>

  <!-- Centre label -->
  <text x="360" y="285" text-anchor="middle" class="label" font-weight="bold">VOLATILE</text>
  <text x="360" y="301" text-anchor="middle" class="label" font-weight="bold">MEMORY</text>
  <text x="360" y="317" text-anchor="middle" class="ref">(RAM)</text>

  <!-- t0 label at write head current position -->
  <text x="360" y="108" text-anchor="middle" class="small">t = 0 (current)</text>

  <!-- T_total brace/annotation -->
  <line x1="80" y1="130" x2="80" y2="460" stroke="black" stroke-width="1.2"/>
  <line x1="80" y1="130" x2="90" y2="130" stroke="black" stroke-width="1.2"/>
  <line x1="80" y1="460" x2="90" y2="460" stroke="black" stroke-width="1.2"/>
  <text x="70" y="300" text-anchor="middle" class="label" font-weight="bold"
        transform="rotate(-90, 70, 300)">T_total  (configurable)</text>

  <!-- Legend / key -->
  <rect x="490" y="175" width="14" height="14" fill="url(#hatch)" opacity="0.55" stroke="black" stroke-width="1"/>
  <text x="510" y="186" class="small">Stored audio data</text>
  <rect x="490" y="197" width="14" height="14" fill="white" stroke="black" stroke-width="1"/>
  <text x="510" y="208" class="small">Empty / overwritten</text>

  <!-- Reference line -->
  <line x1="10" y1="530" x2="710" y2="530" stroke="black" stroke-width="0.6"/>
  <text x="360" y="547" text-anchor="middle" class="small">[120] Volatile Circular Buffer Manager  ·  [121] Write Head  ·  [122] Overwrite Head  ·  T_total = configurable window duration</text>
</svg>
