<?xml version="1.0" encoding="UTF-8"?>
<!--
  Patent Drawing: FIG. 1 - System Architecture Overview
  Application: Variable-Window Retrospective-Prospective Audio Capture System
  Applicant: J & N Yates Pty Ltd ACN 629 701 364
-->
<svg width="800" height="560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="black"/>
    </marker>
  </defs>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; }
    .title  { font-size:14px; font-weight:bold; }
    .sub    { font-size:11px; font-weight:bold; }
    .label  { font-size:10px; }
    .ref    { font-size:9px; font-style:italic; }
    .small  { font-size:8px; }
    line.flow { stroke:black; stroke-width:1.5; marker-end:url(#arr); }
    line.dash { stroke:black; stroke-width:1; stroke-dasharray:4,3; marker-end:url(#arr); }
    rect.box  { fill:white; stroke:black; stroke-width:2; }
    rect.inner{ fill:white; stroke:black; stroke-width:1.2; }
    rect.opt  { fill:white; stroke:black; stroke-width:1.2; stroke-dasharray:5,3; }
  </style>

  <!-- White background -->
  <rect width="800" height="560" fill="white"/>

  <!-- Page title -->
  <text x="400" y="26" text-anchor="middle" class="title">FIG. 1</text>
  <text x="400" y="44" text-anchor="middle" class="sub">SYSTEM ARCHITECTURE OVERVIEW</text>

  <!-- ====== MICROPHONE [110] ====== -->
  <rect x="300" y="60" width="140" height="44" class="box" rx="3"/>
  <text x="370" y="79" text-anchor="middle" class="label" font-weight="bold">MICROPHONE</text>
  <text x="370" y="95" text-anchor="middle" class="ref">[110]</text>
  <!-- mic → buffer arrow -->
  <line x1="370" y1="104" x2="370" y2="148" class="flow"/>
  <text x="388" y="130" class="small">audio stream</text>

  <!-- ====== MAIN APP BOX [100] ====== -->
  <rect x="200" y="150" width="340" height="310" class="box" rx="5"/>
  <text x="370" y="172" text-anchor="middle" class="sub">RECALLPOINT APPLICATION</text>
  <text x="370" y="187" text-anchor="middle" class="ref">[100]  Mobile Computing Device</text>

  <!-- Buffer Manager [120] (inner) -->
  <rect x="215" y="200" width="140" height="46" class="inner"/>
  <text x="285" y="219" text-anchor="middle" class="label" font-weight="bold">BUFFER MANAGER</text>
  <text x="285" y="234" text-anchor="middle" class="ref">[120]  Volatile RAM</text>

  <!-- Trigger Manager [130] (inner) -->
  <rect x="380" y="200" width="148" height="46" class="inner"/>
  <text x="454" y="219" text-anchor="middle" class="label" font-weight="bold">TRIGGER MANAGER</text>
  <text x="454" y="234" text-anchor="middle" class="ref">[130]  OR-Gate [134]</text>

  <!-- dashed connector between buffer and trigger -->
  <line x1="355" y1="223" x2="380" y2="223" class="dash"/>

  <!-- Capture Compositor [140] -->
  <rect x="215" y="264" width="140" height="46" class="inner"/>
  <text x="285" y="283" text-anchor="middle" class="label" font-weight="bold">CAPTURE COMPOSITOR</text>
  <text x="285" y="298" text-anchor="middle" class="ref">[140]</text>
  <!-- buffer → compositor -->
  <line x1="285" y1="246" x2="285" y2="262" class="flow"/>

  <!-- Transcription [150] -->
  <rect x="380" y="264" width="148" height="46" class="inner"/>
  <text x="454" y="283" text-anchor="middle" class="label" font-weight="bold">TRANSCRIPTION</text>
  <text x="454" y="298" text-anchor="middle" class="ref">[150]</text>
  <!-- compositor → transcription -->
  <line x1="355" y1="285" x2="380" y2="285" class="flow"/>
  <!-- trigger → transcription (vertical) -->
  <line x1="454" y1="246" x2="454" y2="262" class="flow"/>

  <!-- Topic Extraction [160] -->
  <rect x="215" y="328" width="313" height="52" class="inner"/>
  <text x="371" y="348" text-anchor="middle" class="label" font-weight="bold">CONTEXTUAL TOPIC EXTRACTION MODULE</text>
  <text x="371" y="365" text-anchor="middle" class="ref">[160]  Key Phrase Extractor [161]  ·  Topic Classifier [162]</text>
  <!-- compositor → extraction -->
  <line x1="285" y1="310" x2="285" y2="326" class="flow"/>
  <!-- transcription → extraction -->
  <line x1="454" y1="310" x2="454" y2="326" class="flow"/>

  <!-- Secure Vault [170] -->
  <rect x="215" y="398" width="313" height="50" class="inner"/>
  <text x="371" y="418" text-anchor="middle" class="label" font-weight="bold">SECURE VAULT</text>
  <text x="371" y="434" text-anchor="middle" class="ref">[170]  AES-256 Encrypted Storage</text>
  <!-- extraction → vault -->
  <line x1="371" y1="380" x2="371" y2="396" class="flow"/>

  <!-- ====== PERIPHERALS (left) ====== -->

  <!-- Bluetooth Earbuds [200] -->
  <rect x="20" y="185" width="138" height="50" class="box" rx="3"/>
  <text x="89" y="205" text-anchor="middle" class="label" font-weight="bold">BLUETOOTH EARBUDS</text>
  <text x="89" y="221" text-anchor="middle" class="ref">[200]  GATT Profile</text>
  <!-- earbuds → trigger mgr -->
  <line x1="158" y1="210" x2="198" y2="218" class="flow"/>
  <text x="164" y="204" class="small">[133]</text>

  <!-- Smartwatch [210] -->
  <rect x="20" y="265" width="138" height="50" class="box" rx="3"/>
  <text x="89" y="285" text-anchor="middle" class="label" font-weight="bold">SMARTWATCH</text>
  <text x="89" y="301" text-anchor="middle" class="ref">[210]  Wearable</text>
  <!-- watch → trigger mgr -->
  <line x1="158" y1="280" x2="198" y2="245" class="flow"/>
  <text x="165" y="275" class="small">[133]</text>

  <!-- Voice Trigger Engine [131] -->
  <rect x="20" y="345" width="138" height="50" class="box" rx="3"/>
  <text x="89" y="362" text-anchor="middle" class="label" font-weight="bold">VOICE TRIGGER ENGINE</text>
  <text x="89" y="378" text-anchor="middle" class="ref">[131]  User-defined phrase</text>
  <!-- voice → trigger mgr -->
  <line x1="158" y1="360" x2="198" y2="275" class="flow"/>
  <text x="160" y="340" class="small">[131]</text>

  <!-- Wireless link label -->
  <text x="89" y="430" text-anchor="middle" class="small">[220] Wireless Link</text>

  <!-- ====== OPTIONAL SHARING [180] (right, dashed) ====== -->
  <rect x="600" y="390" width="148" height="50" class="opt" rx="3"/>
  <text x="674" y="410" text-anchor="middle" class="label">SHARING / EXPORT</text>
  <text x="674" y="426" text-anchor="middle" class="ref">[180]  (Optional)</text>
  <!-- vault → sharing -->
  <line x1="528" y1="423" x2="598" y2="423" class="dash"/>

  <!-- ====== REFERENCE NUMERAL LEGEND ====== -->
  <line x1="10" y1="480" x2="790" y2="480" stroke="black" stroke-width="0.6"/>
  <text x="400" y="495" text-anchor="middle" class="small">[100] App  [110] Microphone  [120] Buffer  [130] Trigger Mgr  [131] Voice Path  [132] In-App  [133] BT Path  [134] OR-Gate</text>
  <text x="400" y="510" text-anchor="middle" class="small">[135] Voice Profile  [140] Compositor  [150] Transcription  [160] Topic Extraction  [161] Key Phrases  [162] Classifier</text>
  <text x="400" y="525" text-anchor="middle" class="small">[170] Vault  [180] Sharing (opt.)  [200] Earbuds  [210] Smartwatch  [220] Wireless Link</text>
</svg>
